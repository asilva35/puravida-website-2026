<!DOCTYPE html lang="es">
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --brand-teal: #38b2ac;
            --brand-dark: #0f172a;
            --brand-light: #f8fafc;
            --brand-white: #ffffff;
            --brand-gray: #f1f5f9;
            --brand-gray-dark: #64748b;
            --brand-gray-light: #94a3b8;
            --brand-gray-lighter: #cbd5e1;
            --brand-gray-lightest: #e2e8f0;
            --brand-gray-lightest: #e2e8f0;
            --text-color: #334155;
            --text-color-light: #64748b;
            --text-color-lighter: #94a3b8;
            --text-color-lightest: #cbd5e1;
            --text-color-lightest: #e2e8f0;
            --text-color-lightest: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            background: #fff;
        }

        /*SKELETON SCREEN*/
        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        /* Clase para desvanecer */
        .fade-out {
            opacity: 0;
            transition: opacity 0.4s ease-out;
            pointer-events: none;
        }

        /*END - SKELETON SCREEN*/

        .brand-teal {
            color: var(--brand-teal);
        }

        .bg-brand-teal {
            background-color: var(--brand-teal);
        }

        .bg-brand-dark {
            background-color: var(--brand-dark);
        }

        .border-brand-teal {
            border-color: var(--brand-teal);
        }

        /* Efectos de vidrio y profundidad */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(56, 178, 172, 0.1), transparent 40%),
                radial-gradient(circle at bottom left, rgba(56, 178, 172, 0.05), transparent 40%);
        }

        /* Utilidad para las tarjetas de valores */
        .value-card {
            transition: all 0.3s ease;
        }

        .value-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(56, 178, 172, 0.1);
        }

        .hero-section {
            /* Background image moved to HTML element for better responsive control */
            background-color: transparent;
        }

        .hero-img-faisan {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .post-content {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--brand-gray-dark);
            text-align: left;
        }

        .post-content p {
            margin-bottom: 1rem;
        }

        .post-content h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .post-content h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
        }

        .post-content h4 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .post-content h5 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .post-content h6 {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .post-content img {
            width: auto;
            height: auto;
        }

        .post-content a {
            color: var(--brand-teal);
            text-decoration: none;
        }

        .post-content a:hover {
            text-decoration: underline;
        }

        .post-content .post_feature_image_container img {
            max-width: 100%;
            height: auto;
        }

        .post-content ul {
            margin-bottom: 1rem;
            list-style-type: disc;
            list-style-position: inside;
            margin-left: 1rem;
            margin-right: 1rem;
        }

        .post-content ol {
            margin-bottom: 1rem;
            list-style-type: decimal;
            list-style-position: inside;
            margin-left: 1rem;
            margin-right: 1rem;
        }

        .post-content li {
            margin-bottom: 0.5rem;
        }

        .post-content li h1,
        .post-content li h2,
        .post-content li h3,
        .post-content li h4,
        .post-content li h5,
        .post-content li h6 {
            display: inline;
        }

        .post-content blockquote {
            margin-bottom: 1rem;
            padding-left: 1rem;
            border-left: 4px solid var(--brand-teal);
        }

        .post-content blockquote p {
            margin-bottom: 0;
        }

        .post-content blockquote footer {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--brand-gray-dark);
        }

        .post-content code {
            background-color: var(--brand-gray-light);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
        }

        .post-content pre {
            margin-bottom: 1rem;
            padding: 1rem;
            background-color: var(--brand-gray-light);
            border-radius: 4px;
            overflow-x: auto;
        }

        .post-content pre code {
            font-size: 0.8rem;
            background-color: transparent;
            padding: 0;
            border-radius: 0;
        }

        .post-content table {
            margin-bottom: 1rem;
            width: 100%;
            border-collapse: collapse;
        }

        .post-content th,
        .post-content td {
            padding: 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--brand-gray-light);
        }

        .post-content th {
            background-color: var(--brand-gray-light);
        }

        .post-content tr:nth-child(even) {
            background-color: var(--brand-gray-lighter);
        }

        .post-content tr:nth-child(odd) {
            background-color: var(--brand-gray-lightest);
        }

        .post-content tr:hover {
            background-color: var(--brand-gray-lighter);
        }

        .post-content tr:hover {
            background-color: var(--brand-gray-lighter);
        }

        .post-content tr:hover {
            background-color: var(--brand-gray-lighter);
        }

        .post-content tr:hover {
            background-color: var(--brand-gray-lighter);
        }

        .post-content tr:hover {
            background-color: var(--brand-gray-lighter);
        }

        .post-content tr:hover {
            background-color: var(--brand-gray-lighter);
        }

        .post-content tr:hover {
            background-color: var(--brand-gray-lighter);
        }


        .related-post {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1rem;
        }

        .related-post img {
            width: 100%;
            max-width: 300px;
        }

        .related-post-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--brand-dark);
            text-align: left;
        }

        .related-post-date {
            font-size: 0.8rem;
            color: var(--brand-gray-dark);
            text-align: left;
        }

        .related-post-excerpt {
            font-size: 0.9rem;
            color: var(--brand-gray-dark);
            text-align: left;
        }
    </style>
    <script src="../../dev-loader.js"></script>
</head>

<body>

    <!-- Skeleton -->
    <div data-faisan-component="skeleton.html"></div>

    <!-- Top Bar -->
    <div data-faisan-component="top-bar.html" data-faisan-url_es="/" data-faisan-url_en="/en/"></div>

    <!-- Header / Nav -->
    <div data-faisan-component="main-nav.html" data-faisan-link_home="/" data-faisan-label_link_home="Inicio"
        data-faisan-link_services="/servicios" data-faisan-label_link_services="Servicios" data-faisan-link_faq="/faq"
        data-faisan-label_link_faq="Preguntas Frecuentes" data-faisan-link_blog="/blog"
        data-faisan-label_link_blog="Blog" data-faisan-link_contact="/contacto"
        data-faisan-label_link_contact="Contacto" data-faisan-placeholder_search="Buscar..."></div>


    <!-- Nosotros Section -->
    <section id="main-content" class="py-24 bg-white">
        <div class="container mx-auto px-6">
            <div class="text-center max-w-3xl mx-auto mb-16">

                <h1 class="editable_content text-3xl md:text-4xl font-bold text-slate-900 mb-6"
                    data-faisan-id="post-title" data-faisan-type="text" data-faisan-label="Post Title">{{post_title}}
                </h1>

            </div>
            <!-- feature image -->
            <div class="post_feature_image_container max-w-3xl mx-auto mb-16">
                {{post_feature_image}}
            </div>

            <div class="max-w-3xl mx-auto mt-16">
                <div class="post-content editable_content" data-faisan-id="post-content" data-faisan-type="text"
                    data-faisan-label="Post Content">{{post_content}}</div>
            </div>
        </div>
    </section>

    <section id="related-posts" class="py-24 bg-white">
        <div class="container mx-auto px-6">
            <div class="text-center max-w-3xl mx-auto mb-16">
                <h2 class="editable_content text-3xl md:text-4xl font-bold text-slate-900 mb-6"
                    data-faisan-id="related-posts-title" data-faisan-type="text"
                    data-faisan-label="Related Posts Title">Related Posts:</h2>
            </div>
            <div class="max-w-3xl mx-auto mt-16 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {{related_posts}}
            </div>
        </div>
    </section>


    <!-- Contact Section -->
    <section id="contacto" class="py-24 bg-white relative">
        <div class="container mx-auto px-6">
            <!-- Contact Form -->
            <div data-faisan-component="contact-form.html"></div>

        </div>

        <!-- Mock Map Background -->
        <div class="absolute inset-0 z-0 opacity-10 pointer-events-none mt-40">
            <svg width="100%" height="100%" viewbox="0 0 100 100" preserveaspectratio="none">
                <path d="M0,50 Q25,30 50,50 T100,50" fill="none" stroke="#38b2ac" stroke-width="0.5"></path>
                <path d="M0,70 Q25,50 50,70 T100,70" fill="none" stroke="#38b2ac" stroke-width="0.5"></path>
            </svg>
        </div>
    </section>

    <!-- Newsletter -->
    <div data-faisan-component="newsletter.html" data-faisan-title="No te pierdas nuestras noticias mensuales"
        data-faisan-button_text="Suscribirse" data-faisan-email_placeholder="Tu correo electrónico"
        data-faisan-captcha_text="No soy un Robot"></div>

    <!-- Footer -->
    <div data-faisan-component="footer.html" data-faisan-fb_url="https://www.facebook.com/Puravidaescrowandtrust"
        data-faisan-ig_url="https://www.instagram.com/puravidaescrowandtrust/"
        data-faisan-li_url="https://www.linkedin.com/company/pura-vida-escrow-and-trust/"></div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        let form = null;
        function checkCaptcha(input) {
            const response = input.value.toLowerCase().trim();
            if (response === 'azul' || response === 'blue') {
                form = input.closest('form');
                form.querySelector('button[type="submit"]').disabled = false;
            }
        }

        function main_init_site() {

            //Captchas
            const captchas = document.querySelectorAll('.simple-captcha');
            if (captchas) {
                captchas.forEach(captcha => {
                    const captchaBox = captcha.querySelector('.captcha-box');
                    const captchaCheck = captcha.querySelector('.captcha-check-icon');
                    const captchaSpinner = captcha.querySelector('.captcha-spinner');
                    const submitBtn = document.querySelector(`[data-faisan-id="${captcha.dataset.buttonId}"]`);
                    let verified = false;

                    captcha.addEventListener('click', () => {
                        if (verified) return;

                        // Start verification
                        captchaBox.classList.remove('border-white/40');
                        captchaBox.classList.add('border-white');
                        captchaSpinner.classList.remove('hidden');

                        // Simulate some "processing"
                        setTimeout(() => {
                            captchaSpinner.classList.add('hidden');
                            captchaCheck.classList.remove('hidden');
                            captcha.classList.add('bg-white/30', 'border-white/40');
                            captcha.classList.remove('cursor-pointer', 'hover:bg-white/20');

                            verified = true;
                            if (submitBtn) submitBtn.disabled = false;

                            // Success animation effect
                            captchaBox.classList.add('scale-110');
                            setTimeout(() => {
                                captchaBox.classList.remove('scale-110');
                            }, 200);
                        }, 1000);
                    });
                });
            }

            const skeleton = document.getElementById('faisan-skeleton');
            if (skeleton) {
                skeleton.classList.add('fade-out');
                setTimeout(() => skeleton.remove(), 400);
            }

            // Mobile Menu Toggle
            const mobileMenu = document.getElementById('mobile-menu-btn');
            if (mobileMenu) {
                mobileMenu.addEventListener('click', function () {
                    document.getElementById('mobile-menu').classList.toggle('hidden');
                });
            }

            // Close mobile menu on click link
            const mobileMenuClose = document.getElementById('mobile-menu');
            if (mobileMenuClose) {
                mobileMenuClose.addEventListener('click', function () {
                    mobileMenuClose.classList.add('hidden');
                });
            }

            // Search Bar Toggle
            const searchOpen = document.getElementById('search-open');
            if (searchOpen) {
                searchOpen.addEventListener('click', function () {
                    document.getElementById('nav-links').classList.remove('flex');
                    document.getElementById('nav-links').classList.add('hidden');
                    document.getElementById('search-bar').classList.remove('hidden');
                    document.getElementById('search-bar').classList.add('flex');
                    document.getElementById('search-bar').querySelector('input').focus();
                });
            }

            const searchClose = document.getElementById('search-close');
            if (searchClose) {
                searchClose.addEventListener('click', function () {
                    document.getElementById('search-bar').classList.remove('flex');
                    document.getElementById('search-bar').classList.add('hidden');
                    document.getElementById('nav-links').classList.remove('hidden');
                    document.getElementById('nav-links').classList.add('flex');
                });
            }

            // Smooth Scroll for links
            const navLinks = document.getElementById('nav-links');
            if (navLinks) {
                navLinks.addEventListener('click', function (event) {
                    var target = document.getElementById(event.target.getAttribute('href'));
                    if (target) {
                        event.preventDefault();
                        window.scrollTo({
                            top: target.offsetTop - 80,
                            behavior: 'smooth'
                        });
                    }
                });
            }

            // Form Submit Logic
            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', function (e) {
                    e.preventDefault();
                    const btn = document.getElementById('contactForm').querySelector('button');
                    const originalText = btn.textContent;

                    btn.disabled = true;
                    btn.textContent = 'Sending...';
                });
            }

            // Accordion Logic
            const faqToggles = document.querySelectorAll('.faq-toggle');
            if (faqToggles) {
                faqToggles.forEach(function (item) {
                    item.addEventListener('click', function () {
                        const item = this.closest('.faq-item');
                        const content = item.querySelector('.faq-content');
                        const icon = item.querySelector('.faq-icon');

                        // Close other items
                        document.querySelectorAll('.faq-item').forEach(function (item) {
                            item.querySelector('.faq-content').style.maxHeight = '0';
                            item.querySelector('.faq-icon').style.transform = 'rotate(0deg)';
                            item.classList.remove('active');
                        });

                        // Toggle current item
                        if (item.classList.contains('active')) {
                            content.style.maxHeight = '0';
                            icon.style.transform = 'rotate(0deg)';
                            item.classList.remove('active');
                        } else {
                            content.style.maxHeight = content.scrollHeight + 'px';
                            icon.style.transform = 'rotate(180deg)';
                            item.classList.add('active');
                        }
                    });
                });
            }

            // Simple reveal on scroll effect
            window.addEventListener('scroll', function () {
                document.querySelectorAll('.value-card').forEach(function (item) {
                    var bottom_of_object = item.offsetTop + item.offsetHeight / 4;
                    var bottom_of_window = window.scrollTop + window.height;

                    if (bottom_of_window > bottom_of_object) {
                        item.style.opacity = '1';
                    }
                });
            });

            // Simple reveal on scroll effect
            window.addEventListener('scroll', function () {
                document.querySelectorAll('.value-card').forEach(function (item) {
                    var bottom_of_object = item.offsetTop + item.offsetHeight / 4;
                    var bottom_of_window = window.scrollTop + window.height;

                    if (bottom_of_window > bottom_of_object) {
                        item.style.opacity = '1';
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            if (window.devLoader) {
                window.devLoader.callback = main_init_site;
            } else {
                main_init_site();
            }
        });
    </script>
</body>

</html>

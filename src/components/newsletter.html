<section class="py-16 bg-brand-teal text-white">
    <div class="container mx-auto px-6 text-center">
        <h2 class="editable_content text-2xl md:text-3xl font-bold mb-8" data-faisan-id="newsletter-title"
            data-faisan-type="text" data-faisan-label="Newsletter Title">{{title}}
        </h2>
        <form data-faisan-table="1517" class="max-w-xl mx-auto flex flex-col gap-4">
            <div class="flex flex-col md:flex-row gap-4">
                <input id="newsletter-email" name="email" type="email" placeholder="{{email_placeholder}}"
                    class="flex-grow px-6 py-4 rounded-xl text-slate-900 outline-none" required>
                <button type="submit"
                    class="editable_content disabled:opacity-50 disabled:cursor-not-allowed bg-brand-dark text-white px-8 py-4 rounded-xl font-bold hover:bg-slate-800 transition-colors"
                    data-faisan-id="newsletter-button" data-faisan-type="button" data-faisan-label="Newsletter Button"
                    disabled>{{button_text}}</button>
            </div>

            <!-- Simple JS Captcha -->
            <div id="captcha-wrapper" class="flex justify-center md:justify-start">
                <div data-button-id="newsletter-button"
                    class="simple-captcha flex items-center bg-white/10 backdrop-blur-sm rounded-xl px-4 py-3 border border-white/20 cursor-pointer hover:bg-white/20 transition-all group">
                    <div
                        class="captcha-box w-6 h-6 border-2 border-white/40 rounded flex items-center justify-center group-hover:border-white transition-colors relative">
                        <svg class="captcha-check-icon hidden w-4 h-4 text-white" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                        <div
                            class="captcha-spinner hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin">
                        </div>
                    </div>
                    <span class="ml-3 text-white text-sm font-medium select-none">{{captcha_text}}</span>
                </div>
            </div>

            <div class="server-response"></div>
        </form>
    </div>
</section>

<div
    class="faq-item group bg-slate-50 border border-slate-100 rounded-2xl overflow-hidden transition-all duration-300 hover:border-brand-teal hover:bg-white hover:shadow-xl">
    <button class="faq-toggle w-full px-8 py-6 flex items-center justify-between text-left focus:outline-none">
        <h3 class="editable_content text-xl font-bold text-slate-900 pr-8"
            data-faisan-id="faq-item-question-{{itemnumber}}" data-faisan-type="text"
            data-faisan-label="FAQ Item Question {{itemnumber}}">{{question}}</h3>
        <span
            class="faq-icon w-8 h-8 rounded-full bg-white flex items-center justify-center text-brand-teal shadow-sm transition-transform duration-300">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
        </span>
    </button>
    <div class="faq-content max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
        <div class="px-8 pb-8 pt-2">
            <div class="h-px bg-slate-100 mb-6"></div>
            <p class="editable_content text-slate-600 leading-relaxed mb-4"
                data-faisan-id="faq-item-answer-{{itemnumber}}" data-faisan-type="text"
                data-faisan-label="FAQ Item Answer {{itemnumber}}">{{answer}}</p>
        </div>
    </div>
</div>

<header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">
    <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center">
            <div class="text-brand-teal font-bold text-2xl flex flex-col leading-none">
                <a href="{{link_home}}">
                    <picture>
                        <source srcset="https://puravidaescrowandtrust.com/wp-content/uploads/2026/03/logo.webp"
                            type="image/webp">
                        <img src="https://puravidaescrowandtrust.com/wp-content/uploads/2026/03/logo.png"
                            class="editable_content" data-faisan-id="logo" data-faisan-type="image"
                            data-faisan-label="Logo" alt="logo pura vida escrow" width="113" height="40">
                    </picture>
                </a>
            </div>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center justify-end flex-1 gap-8 font-medium text-slate-600">
            <div id="nav-links" class="flex items-center gap-8">
                <a href="{{link_home}}" class="editable_content text-brand-teal" data-faisan-id="menu-item-home"
                    data-faisan-type="text" data-faisan-label="Menu Item Home">{{label_link_home}}</a>
                <a href="{{link_services}}" class="editable_content hover:text-brand-teal transition-colors"
                    data-faisan-id="menu-item-services" data-faisan-type="text"
                    data-faisan-label="Menu Item Services">{{label_link_services}}</a>
                <a href="{{link_faq}}" class="editable_content hover:text-brand-teal transition-colors"
                    data-faisan-id="menu-item-faq" data-faisan-type="text"
                    data-faisan-label="Menu Item FAQ">{{label_link_faq}}</a>
                <a href="{{link_blog}}" class="editable_content hover:text-brand-teal transition-colors"
                    data-faisan-id="menu-item-blog" data-faisan-type="text"
                    data-faisan-label="Menu Item Blog">{{label_link_blog}}</a>
                <a href="{{link_contact}}"
                    class="editable_content bg-brand-teal text-white px-6 py-2.5 rounded-full hover:bg-teal-600 transition-all shadow-lg shadow-teal-100"
                    data-faisan-id="menu-item-contact" data-faisan-type="text"
                    data-faisan-label="Menu Item Contact">{{label_link_contact}}</a>

                <button id="search-open" class="hover:text-brand-teal transition-colors p-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z">
                        </path>
                    </svg>
                </button>
            </div>

            <div id="search-bar" class="hidden items-center gap-4 w-full max-w-lg">
                <form action="/" method="get" class="relative flex-grow mb-0">
                    <input name="s" type="text" placeholder="{{placeholder_search}}"
                        class="w-full border border-slate-200 rounded-full px-5 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-teal/20 focus:border-brand-teal">
                    <button type="submit"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-teal">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z">
                            </path>
                        </svg>
                    </button>
                </form>
                <button id="search-close" class="text-slate-400 hover:text-slate-600 transition-colors p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden p-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-100 p-6 flex flex-col gap-4">
        <a href="{{link_home}}" class="editable_content text-brand-teal font-medium"
            data-faisan-id="menu-item-home-mobile" data-faisan-type="text"
            data-faisan-label="Menu Item Home">{{label_link_home}}</a>
        <a href="{{link_services}}" class="editable_content font-medium" data-faisan-id="menu-item-services-mobile"
            data-faisan-type="text" data-faisan-label="Menu Item Services">{{label_link_services}}</a>
        <a href="{{link_faq}}" class="editable_content font-medium" data-faisan-id="menu-item-faq-mobile"
            data-faisan-type="text" data-faisan-label="Menu Item FAQ">{{label_link_faq}}</a>
        <a href="{{link_blog}}" class="editable_content font-medium" data-faisan-id="menu-item-blog-mobile"
            data-faisan-type="text" data-faisan-label="Menu Item Blog">{{label_link_blog}}</a>
        <a href="{{link_contact}}" class="editable_content bg-brand-teal text-white px-6 py-3 rounded-xl text-center"
            data-faisan-id="menu-item-contact-mobile" data-faisan-type="text"
            data-faisan-label="Menu Item Contact">{{label_link_contact}}</a>
    </div>
</header>
